<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f8fb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="こぶん活用" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>こぶん活用</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=18" />
    <script defer src="data.js?v=18"></script>
    <script defer src="app.js?v=18"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="assets/icon.svg" alt="" width="48" height="48" />
          <div>
            <h1>こぶん活用</h1>
            <p id="dailyLine">助動詞・活用暗記</p>
          </div>
        </div>
        <button class="icon-button" id="resetProgress" type="button" aria-label="進捗を初期化" title="進捗を初期化">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M6.5 6l.8 14h9.4l.8-14" />
            <path d="M10 10v6" />
            <path d="M14 10v6" />
          </svg>
        </button>
      </header>

      <main>
        <section class="stats-grid" aria-label="進捗">
          <div class="stat">
            <span>正答</span>
            <strong id="correctStat">0</strong>
          </div>
          <div class="stat">
            <span>連続</span>
            <strong id="streakStat">0</strong>
          </div>
          <div class="stat">
            <span>定着</span>
            <strong id="masteredStat">0%</strong>
          </div>
          <div class="stat">
            <span>ミス</span>
            <strong id="mistakeStat">0</strong>
          </div>
        </section>

        <nav class="tabbar" aria-label="表示切替">
          <button class="tab is-active" type="button" data-view="cards">暗記</button>
          <button class="tab" type="button" data-view="quiz">小テスト</button>
          <button class="tab" type="button" data-view="exam">期末</button>
          <button class="tab" type="button" data-view="tables">一覧</button>
        </nav>

        <section class="view is-active" id="cardsView" aria-labelledby="cardsTitle">
          <div class="toolbar">
            <div class="segmented" id="cardCategory" aria-label="暗記カテゴリ"></div>
            <button class="toggle-chip" id="toggleCardExamples" type="button" aria-pressed="false">例文表示</button>
            <button class="icon-button" id="shuffleCard" type="button" aria-label="次のカード" title="次のカード">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M16 3h5v5" />
                <path d="M4 20L21 3" />
                <path d="M21 16v5h-5" />
                <path d="M15 15l6 6" />
                <path d="M4 4l5 5" />
              </svg>
            </button>
          </div>

          <article class="study-card" id="studyCard">
            <div class="card-head">
              <div>
                <p class="eyebrow" id="cardKind">助動詞</p>
                <h2 id="cardTitle">べし</h2>
              </div>
              <span class="tag" id="cardLevel">基本</span>
            </div>
            <p class="prompt" id="cardPrompt">接続・意味・活用</p>
            <button class="answer-panel" id="showAnswer" type="button">
              <span id="answerCue">答え</span>
              <span class="answer-content" id="answerText"></span>
            </button>
            <div class="card-actions">
              <button class="soft-button" id="againCard" type="button">もう一度</button>
              <button class="primary-button" id="knownCard" type="button">覚えた</button>
            </div>
          </article>
        </section>

        <section class="view" id="quizView" aria-labelledby="quizTitle">
          <div class="toolbar">
            <div class="segmented" id="quizCategory" aria-label="小テストカテゴリ"></div>
            <button class="icon-button" id="nextQuiz" type="button" aria-label="次の問題" title="次の問題">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 12h14" />
                <path d="M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>

          <article class="quiz-card">
            <p class="eyebrow" id="quizKind">助動詞</p>
            <h2 id="quizQuestion">問題</h2>
            <div class="choices" id="choices"></div>
            <button class="unknown-button" id="unknownQuiz" type="button">わからない</button>
            <p class="feedback" id="feedback" aria-live="polite"></p>
            <div class="explanation quiz-explanation" id="quizExplanation"></div>
          </article>
        </section>

        <section class="view" id="examView" aria-labelledby="examTitle">
          <div class="toolbar">
            <div class="segmented exam-segmented" id="examCategory" aria-label="期末範囲"></div>
            <button class="icon-button" id="nextExam" type="button" aria-label="次の問題" title="次の問題">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 12h14" />
                <path d="M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>

          <article class="quiz-card">
            <p class="eyebrow" id="examKind">期末対策</p>
            <p class="exam-passage" id="examPassage"></p>
            <h2 id="examQuestion">問題</h2>
            <div class="choices" id="examChoices"></div>
            <button class="unknown-button" id="unknownExam" type="button">わからない</button>
            <p class="feedback" id="examFeedback" aria-live="polite"></p>
            <p class="explanation" id="examExplanation"></p>
          </article>
        </section>

        <section class="view" id="tablesView" aria-labelledby="tablesTitle">
          <div class="segmented library-mode" id="tableMode" aria-label="一覧の種類"></div>
          <div class="toolbar table-toolbar">
            <div class="segmented" id="tableCategory" aria-label="一覧カテゴリ"></div>
            <label class="search-box">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" />
                <path d="m16 16 5 5" />
              </svg>
              <input id="tableSearch" type="search" placeholder="検索" autocomplete="off" />
            </label>
            <button class="toggle-chip" id="toggleTableExamples" type="button" aria-pressed="false">例文表示</button>
          </div>
          <div class="table-list" id="tableList"></div>
          <div class="table-list is-hidden" id="questionList"></div>
          <div class="table-list is-hidden" id="mistakeList"></div>
          <div class="table-list is-hidden" id="encyclopediaList"></div>
        </section>
      </main>
    </div>

    <button class="floating-next" id="floatingNext" type="button" aria-label="次へ">
      <span>次へ</span>
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M5 12h14" />
        <path d="M13 6l6 6-6 6" />
      </svg>
    </button>

    <template id="entryTemplate">
      <article class="entry">
        <div class="entry-summary">
          <div>
            <p class="eyebrow entry-type"></p>
            <h3></h3>
          </div>
          <span class="tag entry-level"></span>
        </div>
        <dl class="facts"></dl>
        <div class="conjugation-wrap"></div>
      </article>
    </template>
  </body>
</html>
